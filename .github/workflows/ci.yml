name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install ruff

      - name: Run Ruff
        run: |
          ruff check app/

      - name: Build Docker image
        run: |
          docker build -t statuspulse-app .

      - name: Start services
        run: |
          docker compose up -d

      - name: Check containers
        run: |
          docker ps

      - name: Stop services
        run: |
          docker compose down
